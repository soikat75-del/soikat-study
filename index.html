<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Soikat BCS Hub</title>
    <meta name="description" content="A premium personal BCS study hub." />
    <meta name="theme-color" content="#0D1117" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app">

        <!-- ================= HEADER ================= -->
       <header class="header">

    <div class="header-left">

        <a href="../index.html" class="logo">

            <span class="logo-mark">S</span>

            <span class="logo-text">

                <h1>SOIKAT STUDY HUB</h1>

                <small>A Premium Personal Study Workspace</small>

            </span>

        </a>

    </div>

    <div class="clock">

        <span id="weekday"></span>

        <span id="date"></span>

        <span id="time"></span>

    </div>

</header>

        <!-- ================= SEARCH ================= -->
        <section class="search-section">

    <div class="search-box">

        <svg
    class="search-icon"
    xmlns="http://www.w3.org/2000/svg"
    width="20"
    height="20"
    viewBox="0 0 24 24"
    fill="none">

    <path
        d="M21 21L16.65 16.65M11 18C7.134 18 4 14.866 4 11S7.134 4 11 4s7 3.134 7 7-3.134 7-7 7Z"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>

        <input
            type="text"
            id="searchInput"
            placeholder="Search everything..."
            autocomplete="off">

    </div>

    <div id="searchResults" class="search-results"></div>

</section>

        <!-- ================= DASHBOARD ================= -->
        <main class="dashboard">
    
            <a href="pages/subjects.html" class="card">
                <h2>Subjects</h2>
                <p>Browse all study materials.</p>
            </a>

            <a href="pages/strategy.html" class="card">
                <h2>Strategy</h2>
                <p>Preparation roadmap and resources.</p>
            </a>

            <a href="pages/tracker.html" class="card">
                <h2>Study Tracker</h2>
                <p>Track your daily progress.</p>
            </a>

            <a href="pages/planner.html" class="card">
                <h2>Planner</h2>
                <p>Plan your study sessions.</p>
            </a>

        </main>

        <!-- ================= QUOTE ================= -->
        <section class="quote-card">

            <blockquote id="quote">
                Discipline beats motivation.
            </blockquote>

        </section>

        <!-- ================= FOOTER ================= -->
        <footer class="footer">

            <span>Built for BCS Aspirants</span>

            <span>Version 0.1.0</span>

        </footer>

    </div>

    <!-- JavaScript -->
    <script src="js/data.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/quotes.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
