<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soikat BCS Hub</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#08111f;
color:white;
}

.glass{
background:#101b2d;
border:1px solid #1c2a44;
}

.card{
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
border-color:#2563eb;
box-shadow:0 15px 40px rgba(37,99,235,.25);
}

</style>

</head>

<body>

<header class="glass h-20 flex items-center justify-between px-10">

<a href="index.html"
class="flex items-center gap-3 text-2xl font-bold">

<div
class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center">

<i data-lucide="graduation-cap"></i>

</div>

<span>

Soikat BCS Hub

</span>

</a>

<div class="flex items-center gap-4">

<div class="relative">

<input

id="search"

type="text"

placeholder="Search..."

class="w-96 bg-[#08111f] border border-slate-700 rounded-xl py-3 pl-12 pr-5 outline-none focus:border-blue-500">

<i

data-lucide="search"

class="absolute left-4 top-3.5 w-5 h-5 text-slate-500">

</i>

</div>

<button

class="w-12 h-12 rounded-xl glass">

<i data-lucide="moon"></i>

</button>

</div>

</header>

<main class="max-w-7xl mx-auto p-10">

<div class="glass rounded-3xl p-8 mb-8">

<div class="flex justify-between">

<div>

<p class="text-slate-400">

Today

</p>

<h2

id="todayDate"

class="text-3xl font-bold mt-2">

Loading...

</h2>

</div>

<div>

<p class="text-slate-400">

Time

</p>

<h2

id="liveTime"

class="text-3xl font-bold mt-2 text-blue-400">

Loading...

</h2>

</div>

<div>

<p class="text-slate-400">

Next Exam

</p>

<h2 class="text-2xl mt-2">

No Exam Scheduled

</h2>

</div>

</div>

</div>

<div class="grid grid-cols-4 gap-6">

<a href="pages/subjects.html"
class="card glass rounded-3xl p-8">

<h2 class="text-2xl font-semibold">

Subjects

</h2>

<p class="mt-3 text-slate-400">

All BCS Subjects

</p>

</a>

<a href="pages/strategy.html"
class="card glass rounded-3xl p-8">

<h2 class="text-2xl font-semibold">

Strategy

</h2>

<p class="mt-3 text-slate-400">

Books & Resources

</p>

</a>

<a href="pages/tracker.html"
class="card glass rounded-3xl p-8">

<h2 class="text-2xl font-semibold">

Study Tracker

</h2>

<p class="mt-3 text-slate-400">

Track Progress

</p>

</a>

<a href="pages/planner.html"
class="card glass rounded-3xl p-8">

<h2 class="text-2xl font-semibold">

Planner

</h2>

<p class="mt-3 text-slate-400">

Calendar & Notes

</p>

</a>

</div>

</main>

<script>

function updateClock(){

const now=new Date();

document.getElementById("todayDate").innerHTML=
now.toLocaleDateString("en-GB",{

weekday:"long",
day:"numeric",
month:"long",
year:"numeric",
timeZone:"Asia/Dhaka"

});

document.getElementById("liveTime").innerHTML=
now.toLocaleTimeString("en-US",{

hour:"2-digit",
minute:"2-digit",
second:"2-digit",
hour12:true,
timeZone:"Asia/Dhaka"

});

}

updateClock();

setInterval(updateClock,1000);

lucide.createIcons();

</script>

</body>
</html>
